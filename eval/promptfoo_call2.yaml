# Promptfoo config — Call 2 model benchmark
# Compares Claude Haiku / Sonnet / Opus / gpt-4o on scoring frozen evidence.
#
# Pre-requisites:
#   1. python eval/freeze_contexts.py          (already done)
#   2. python eval/generate_promptfoo_tests.py (run before promptfoo)
#   3. npm install -g promptfoo                (version 0.121.x)
#
# Run:
#   cd <repo-root>
#   npx promptfoo eval --config eval/promptfoo_call2.yaml --repeat 3

description: "InsightEdge signal-scoring benchmark: Haiku / Sonnet / Opus / gpt-4o"

providers:
  - id: anthropic:messages:claude-haiku-4-5
    label: haiku-4-5
    config:
      temperature: 0
      max_tokens: 2048

  - id: anthropic:messages:claude-sonnet-4-6
    label: sonnet-4-6
    config:
      temperature: 0
      max_tokens: 2048

  - id: anthropic:messages:claude-opus-4-8
    label: opus-4-8
    config:
      temperature: 0
      max_tokens: 2048

  - id: openai:gpt-4o
    label: gpt-4o
    config:
      temperature: 0
      max_tokens: 2048

# Single prompt template: system + user injected from test vars
prompts:
  - label: score-frozen-evidence
    raw: "[{\"role\": \"system\", \"content\": \"{{system_prompt}}\"}, {\"role\": \"user\", \"content\": \"{{frozen_context}}\"}]"

# Judge model for llm-rubric assertions
defaultTest:
  options:
    provider: openai:gpt-4o

# Test cases generated by generate_promptfoo_tests.py
tests: file://promptfoo_tests.json
